<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRM Admin | All Sites | Flood Early Warning System</title>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', monospace;
            background: #0a0e12;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px;
            background: linear-gradient(135deg, #1a1e24, #0f1217);
            border-radius: 20px;
            border: 1px solid #2a2f38;
        }

        .header h1 {
            font-size: 1.8em;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 0.8em;
            color: #8892b0;
            margin-top: 5px;
        }

        .time-display {
            font-size: 2em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 8px 0;
            color: #4fc3f7;
        }

        .date-display {
            color: #8892b0;
            font-size: 0.85em;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1a1e24;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2f38;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-top: 6px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .site-card {
            background: #1a1e24;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2f38;
            transition: all 0.2s;
        }

        .site-card.level-red { background: #2a0a0a; border-left: 4px solid #f44336; animation: pulse-red 0.5s infinite; }
        .site-card.level-orange { background: #2a1a0a; border-left: 4px solid #ff9800; animation: pulse-orange 0.8s infinite; }
        .site-card.level-yellow { background: #2a2a0a; border-left: 4px solid #ffc107; }
        .site-card.level-normal { background: #0a1a0a; border-left: 4px solid #4caf50; }
        .site-card.offline { background: #1a1a1a; border-left: 4px solid #757575; opacity: 0.7; }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.85; } 100% { opacity: 1; } }
        @keyframes pulse-orange { 0% { opacity: 1; } 50% { opacity: 0.9; } 100% { opacity: 1; } }

        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .site-title h3 { font-size: 1.1em; }
        .site-title p { font-size: 0.8em; color: #8892b0; }

        .site-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
        }
        .status-online { background: #4caf50; color: white; }
        .status-offline { background: #757575; color: white; }

        .alert-display {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            border-radius: 16px;
            margin: 10px 0;
        }

        .alert-message {
            font-size: 0.9em;
            text-align: center;
            margin: 10px 0;
            color: #8892b0;
        }

        .alert-instruction {
            background: #0f1217;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8em;
            text-align: center;
        }

        .site-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.7em;
            color: #8892b0;
        }

        .logs-card {
            background: #1a1e24;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2f38;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2f38;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logs-buttons {
            display: flex;
            gap: 10px;
        }

        .clear-btn, .export-btn {
            background: #2a2f38;
            border: none;
            color: #8892b0;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: monospace;
            transition: all 0.2s;
        }

        .clear-btn:hover { background: #3a3f48; color: white; }
        .export-btn:hover { background: #4caf50; color: white; }

        .logs-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .log-item {
            padding: 10px;
            border-left: 3px solid;
            margin-bottom: 8px;
            background: #0f1217;
            border-radius: 10px;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
        }

        .log-normal { border-left-color: #4caf50; }
        .log-yellow { border-left-color: #ffc107; }
        .log-orange { border-left-color: #ff9800; }
        .log-red { border-left-color: #f44336; }
        .log-offline { border-left-color: #9e9e9e; }

        .log-time {
            font-size: 0.7em;
            color: #8892b0;
            margin-top: 4px;
        }

        .status-bar {
            background: #0f1217;
            border-radius: 60px;
            padding: 12px 16px;
            text-align: center;
            border: 1px solid #2a2f38;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            display: inline-block;
            margin-right: 8px;
        }
        .led-online { background: #4caf50; animation: pulse 1s infinite; }
        .led-offline { background: #f44336; }
        .led-waiting { background: #ffc107; animation: pulse 1s infinite; }

        .audio-reminder {
            background: #f44336;
            color: white;
            padding: 14px;
            border-radius: 12px;
            margin-top: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 0.8s infinite;
        }

        .audio-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2a2f38;
            border: none;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.8em;
            z-index: 100;
            transition: all 0.2s;
        }

        .audio-toggle:hover { transform: scale(1.05); }

        .logs-list::-webkit-scrollbar { width: 6px; }
        .logs-list::-webkit-scrollbar-track { background: #0f1217; border-radius: 10px; }
        .logs-list::-webkit-scrollbar-thumb { background: #2a2f38; border-radius: 10px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌊 DRM River Monitoring System</h1>
        <div class="subtitle">ADMIN COMMAND CENTER | All Sites</div>
        <div class="time-display" id="liveTime">--:--:--</div>
        <div class="date-display" id="liveDate">--</div>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><div>🌊 TOTAL SITES</div><div class="stat-value" id="totalSites">0</div></div>
        <div class="stat-card"><div>🔴 RED ALERTS</div><div class="stat-value" id="redCount" style="color: #f44336;">0</div></div>
        <div class="stat-card"><div>🟠 ORANGE ALERTS</div><div class="stat-value" id="orangeCount" style="color: #ff9800;">0</div></div>
        <div class="stat-card"><div>🟡 YELLOW ALERTS</div><div class="stat-value" id="yellowCount" style="color: #ffc107;">0</div></div>
    </div>

    <div class="dashboard-grid" id="dashboardGrid"><div style="text-align: center; padding: 50px;">Loading sites...</div></div>

    <div class="logs-card">
        <div class="logs-header">
            <span>📜 SYSTEM-WIDE INCIDENT LOG</span>
            <div class="logs-buttons">
                <button class="export-btn" onclick="exportLogsToCSV()">📥 EXPORT CSV</button>
                <button class="clear-btn" onclick="clearLogs()">🗑️ CLEAR LOGS</button>
            </div>
        </div>
        <div class="logs-list" id="logsList"><div style="text-align: center; padding: 20px;">Awaiting data...</div></div>
    </div>

    <div class="status-bar">
        <span class="led led-waiting" id="statusLed"></span>
        <span id="statusText">Establishing connection...</span>
        <span id="telemetryTimer" style="float: right; font-family: monospace; font-size: 0.8em;"></span>
    </div>

    <div id="audioReminder" class="audio-reminder" style="display: none;" onclick="enableAudioAndAlerts()">
        🔔 CRITICAL: CLICK HERE TO ENABLE AUDIO ALERTS 🔔
    </div>
</div>

<button class="audio-toggle" id="audioToggle" onclick="toggleAudio()" style="background: #f44336;">🔇</button>

<script>
    // ============================================
    // 🌊 ADMIN DASHBOARD - SEES ALL SITES
    // ============================================
    
    // ----- MQTT CONFIGURATION (DO NOT CHANGE) -----
    const MQTT_HOST = "wss://699cfaaf78a040b5a6ab0bb14948e8f1.s1.eu.hivemq.cloud:8884/mqtt";
    const MQTT_USERNAME = "Admin";
    const MQTT_PASSWORD = "Admin12345";
    
    // Admin subscribes to ALL data from all sites
    const SUBSCRIBE_TOPICS = ["drm/admin/all"];
    
    // ----- OFFLINE DETECTION (Milliseconds) -----
    const OFFLINE_TIMEOUT_MS = 60000;      // 60 seconds - Mark offline after no data
    
    // ----- UI SETTINGS -----
    const SITE_TITLE = "ADMIN COMMAND CENTER | All Sites";
    
    // ============================================
    // END OF CONFIGURATION
    // ============================================
    
    document.querySelector('.subtitle').innerHTML = SITE_TITLE;
    
    let sites = {};
    let alertLogs = [];
    let lastAnyMessage = Date.now();
    let client = null;
    let alertLoopInterval = null;
    let currentAlertLevel = null;
    let audioContext = null;
    let audioEnabled = false;

    const ALERT_PATTERNS = {
        YELLOW: { frequencies: [600, 1200], durations: [1, 1], pauseBetween: 0.8, repeatEvery: 5000 },
        ORANGE: { frequencies: [880, 1046, 880], durations: [0.5, 0.5, 0.5], pauseBetween: 0.15, repeatEvery: 3000 },
        RED: { frequencies: [1046, 880, 1046, 880, 1318, 1046, 880], durations: [0.3, 0.3, 0.3, 0.3, 0.6, 0.3, 0.8], pauseBetween: 0.08, repeatEvery: 1000 },
        OFFLINE: { frequencies: [523, 493, 440], durations: [0.5, 0.5, 0.8], pauseBetween: 0.3, repeatEvery: 4000 }
    };

    function initAudio() {
        if (!audioContext && audioEnabled) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioContext;
    }

    async function playUrgentPattern(level) {
        if (!audioEnabled) return;
        const pattern = ALERT_PATTERNS[level];
        if (!pattern) return;
        const ctx = initAudio();
        if (!ctx || ctx.state !== 'running') {
            if (ctx && ctx.state === 'suspended') {
                ctx.resume().then(() => playUrgentPattern(level));
            }
            return;
        }
        const now = ctx.currentTime;
        let timeOffset = 0;
        for (let i = 0; i < pattern.frequencies.length; i++) {
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            oscillator.frequency.value = pattern.frequencies[i];
            let volume = (level === 'RED') ? 0.5 : (level === 'ORANGE') ? 0.4 : 0.35;
            gainNode.gain.value = volume;
            oscillator.start(now + timeOffset);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, now + timeOffset + pattern.durations[i]);
            oscillator.stop(now + timeOffset + pattern.durations[i]);
            timeOffset += pattern.durations[i] + pattern.pauseBetween;
        }
    }

    function startRepetitiveAlerts(level) {
        if (!audioEnabled) { showAudioReminder(); return; }
        if (alertLoopInterval) clearInterval(alertLoopInterval);
        currentAlertLevel = level;
        const pattern = ALERT_PATTERNS[level];
        if (!pattern) return;
        console.log(`🔔 ACTIVATING ${level} ALERT PROTOCOL`);
        playUrgentPattern(level);
        if ((level === 'RED' || level === 'ORANGE') && navigator.vibrate) {
            navigator.vibrate([500, 200, 500, 200, 1000, 200, 500]);
        }
        alertLoopInterval = setInterval(() => {
            if (currentAlertLevel === level && audioEnabled) {
                playUrgentPattern(level);
                if (level === 'RED' && navigator.vibrate) navigator.vibrate([1000, 200, 1000]);
            }
        }, pattern.repeatEvery);
    }

    function stopRepetitiveAlerts() {
        if (alertLoopInterval) { clearInterval(alertLoopInterval); alertLoopInterval = null; }
        currentAlertLevel = null;
        if (navigator.vibrate) navigator.vibrate(0);
        console.log('🔔 Alert protocol deactivated');
    }

    function showAudioReminder() {
        const reminder = document.getElementById('audioReminder');
        if (reminder) reminder.style.display = 'block';
    }

    function hideAudioReminder() {
        const reminder = document.getElementById('audioReminder');
        if (reminder) reminder.style.display = 'none';
    }

    function enableAudioAndAlerts() {
        audioEnabled = true;
        const ctx = initAudio();
        if (ctx) {
            ctx.resume().then(() => {
                console.log('✅ Audio alerts enabled');
                hideAudioReminder();
                const btn = document.getElementById('audioToggle');
                btn.innerHTML = '🔊';
                btn.style.background = '#4caf50';
                if (currentAlertLevel && currentAlertLevel !== 'NORMAL') startRepetitiveAlerts(currentAlertLevel);
            }).catch(err => console.error('Audio init failed:', err));
        }
    }

    function toggleAudio() {
        if (!audioEnabled) {
            enableAudioAndAlerts();
        } else {
            audioEnabled = false;
            stopRepetitiveAlerts();
            const btn = document.getElementById('audioToggle');
            btn.innerHTML = '🔇';
            btn.style.background = '#f44336';
            if (audioContext) audioContext.suspend();
            console.log('🔇 Audio alerts disabled');
        }
    }

    function updateStats() {
        let counts = { RED: 0, ORANGE: 0, YELLOW: 0, total: 0 };
        for (let id in sites) {
            if (sites[id].alert === 'RED') counts.RED++;
            else if (sites[id].alert === 'ORANGE') counts.ORANGE++;
            else if (sites[id].alert === 'YELLOW') counts.YELLOW++;
            counts.total++;
        }
        document.getElementById('totalSites').innerHTML = counts.total;
        document.getElementById('redCount').innerHTML = counts.RED;
        document.getElementById('orangeCount').innerHTML = counts.ORANGE;
        document.getElementById('yellowCount').innerHTML = counts.YELLOW;
    }

    function addLog(alert, location, siteId, message, action, eventType) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-PH', { hour12: false });
        const dateStr = now.toLocaleDateString('en-PH');
        alertLogs.unshift({ alert, location, siteId, message, action, time: timeStr, date: dateStr, status_type: eventType });
        if (alertLogs.length > 200) alertLogs.pop();
        renderLogs();
        saveLogs();
        if (eventType !== 'continuous' && eventType !== 'telemetry') {
            if (alert === 'YELLOW') startRepetitiveAlerts('YELLOW');
            else if (alert === 'ORANGE') startRepetitiveAlerts('ORANGE');
            else if (alert === 'RED') startRepetitiveAlerts('RED');
            else if (alert === 'OFFLINE') startRepetitiveAlerts('OFFLINE');
            else if (alert === 'NORMAL' || alert === 'RECOVERED') stopRepetitiveAlerts();
        }
    }

    function renderLogs() {
        const logsDiv = document.getElementById('logsList');
        if (alertLogs.length === 0) { logsDiv.innerHTML = '<div style="text-align: center; padding: 20px;">No incident records</div>'; return; }
        logsDiv.innerHTML = alertLogs.map(log => `
            <div class="log-item log-${log.alert.toLowerCase()}">
                <strong>[${log.alert}]</strong> ${log.location} - ${log.siteId}<br>${log.message}
                <div class="log-time">${log.date} ${log.time} · ${log.action}</div>
            </div>
        `).join('');
    }

    function exportLogsToCSV() {
        if (alertLogs.length === 0) { alert("No incident records to export!"); return; }
        let csv = "\uFEFFDate,Time,Alert Level,Location,Site,Message,Instruction\n";
        alertLogs.forEach(log => {
            csv += `${log.date},${log.time},${log.alert},${log.location},${log.siteId},"${log.message}","${log.action}"\n`;
        });
        const now = new Date();
        const filename = `DRM_Admin_Logs_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}.csv`;
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function clearLogs() {
        if (confirm('WARNING: This will permanently delete all incident records. Are you sure?')) {
            alertLogs = [];
            localStorage.removeItem('drm_admin_logs');
            renderLogs();
        }
    }

    function loadLogs() {
        const saved = localStorage.getItem('drm_admin_logs');
        if (saved) {
            try {
                alertLogs = JSON.parse(saved);
                renderLogs();
            } catch(e) {}
        }
    }

    function saveLogs() {
        localStorage.setItem('drm_admin_logs', JSON.stringify(alertLogs.slice(0, 200)));
    }

    function updateSiteUI(siteKey, data) {
        const card = document.getElementById(`card-${siteKey.replace(/[^a-zA-Z0-9]/g, '_')}`);
        if (!card) return;
        card.className = 'site-card';
        if (data.offline) card.classList.add('offline');
        else if (data.alert === 'RED') card.classList.add('level-red');
        else if (data.alert === 'ORANGE') card.classList.add('level-orange');
        else if (data.alert === 'YELLOW') card.classList.add('level-yellow');
        else card.classList.add('level-normal');
        
        card.querySelector('.alert-display').innerHTML = data.offline ? '📡 OFFLINE' : 
            (data.alert === 'RED' ? '🔴 RED ALERT' : data.alert === 'ORANGE' ? '🟠 ORANGE ALERT' : data.alert === 'YELLOW' ? '🟡 YELLOW ALERT' : '✅ NORMAL');
        card.querySelector('.alert-message').innerHTML = data.offline ? 'No telemetry received' : (data.message || 'River conditions normal');
        card.querySelector('.alert-instruction').innerHTML = data.offline ? 'Check device connection' : (data.instruction || 'No action required');
        card.querySelector('.site-status').className = `site-status ${data.offline ? 'status-offline' : 'status-online'}`;
        card.querySelector('.site-status').innerHTML = data.offline ? 'OFFLINE' : 'ONLINE';
        if (data.rssi) card.querySelector('.rssi').innerHTML = data.rssi;
        if (data.lastUpdate) card.querySelector('.last-update').innerHTML = data.lastUpdate;
    }

    function renderDashboard() {
        const grid = document.getElementById('dashboardGrid');
        if (Object.keys(sites).length === 0) {
            grid.innerHTML = '<div style="text-align: center; padding: 50px;">No sites detected. Waiting for data...</div>';
            return;
        }
        grid.innerHTML = Object.keys(sites).map(siteKey => {
            const s = sites[siteKey];
            const safeId = siteKey.replace(/[^a-zA-Z0-9]/g, '_');
            return `
                <div class="site-card level-normal" id="card-${safeId}">
                    <div class="site-header">
                        <div class="site-title">
                            <h3>${s.siteId}</h3>
                            <p>${s.location}</p>
                        </div>
                        <div class="site-status status-online">ONLINE</div>
                    </div>
                    <div class="alert-display">✅ NORMAL</div>
                    <div class="alert-message">River conditions normal</div>
                    <div class="alert-instruction">No action required</div>
                    <div class="site-footer">
                        <span>📡 RSSI: <span class="rssi">--</span> dBm</span>
                        <span class="last-update">🕐 --:--:--</span>
                    </div>
                </div>
            `;
        }).join('');
        for (let siteKey in sites) updateSiteUI(siteKey, sites[siteKey]);
    }

    // ============================================
    // FIXED: Process message with proper timestamp
    // ============================================
    function processMessage(data) {
        const siteKey = `${data.location}|${data.site_id}`;
        
        if (!sites[siteKey]) {
            sites[siteKey] = { 
                location: data.location, 
                siteId: data.site_id, 
                alert: 'NORMAL', 
                message: '', 
                instruction: '', 
                rssi: null, 
                lastUpdateTimestamp: null,
                lastUpdate: null,
                offline: false 
            };
            renderDashboard();
        }
        
        // ✅ CRITICAL: Store actual timestamp for offline detection
        sites[siteKey].lastUpdateTimestamp = Date.now();
        
        sites[siteKey].alert = data.alert || 'NORMAL';
        sites[siteKey].message = data.message || '';
        sites[siteKey].instruction = data.instruction || '';
        sites[siteKey].offline = false;
        
        if (data.rssi) sites[siteKey].rssi = data.rssi;
        
        const now = new Date();
        sites[siteKey].lastUpdate = now.toLocaleTimeString('en-PH', { hour12: false });
        
        if (data.event !== 'continuous' && data.type !== 'telemetry') {
            addLog(data.alert || 'NORMAL', data.location, data.site_id, data.message || 'Status update', data.instruction || '', data.event || 'trigger');
        }
        
        updateSiteUI(siteKey, sites[siteKey]);
        updateStats();
    }

    // ============================================
    // FIXED: Process telemetry with proper timestamp
    // ============================================
    function processTelemetry(data) {
        const siteKey = `${data.location}|${data.site_id}`;
        
        if (!sites[siteKey]) {
            sites[siteKey] = { 
                location: data.location, 
                siteId: data.site_id, 
                alert: 'NORMAL', 
                message: '', 
                instruction: '', 
                rssi: null, 
                lastUpdateTimestamp: null,
                lastUpdate: null,
                offline: false 
            };
            renderDashboard();
        }
        
        // ✅ CRITICAL: Store actual timestamp for offline detection
        sites[siteKey].lastUpdateTimestamp = Date.now();
        
        sites[siteKey].rssi = data.rssi;
        sites[siteKey].offline = false;
        
        const now = new Date();
        sites[siteKey].lastUpdate = now.toLocaleTimeString('en-PH', { hour12: false });
        
        updateSiteUI(siteKey, sites[siteKey]);
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('liveTime').innerHTML = now.toLocaleTimeString('en-PH', { hour12: false });
        document.getElementById('liveDate').innerHTML = now.toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function connectMQTT() {
        const led = document.getElementById('statusLed');
        const textSpan = document.getElementById('statusText');
        led.className = 'led led-waiting';
        textSpan.innerHTML = 'Connecting to MQTT...';
        
        client = mqtt.connect(MQTT_HOST, {
            username: MQTT_USERNAME,
            password: MQTT_PASSWORD,
            protocol: 'wss',
            reconnectPeriod: 5000,
            connectTimeout: 15000,
            keepalive: 60
        });
        
        client.on('connect', () => {
            console.log('✅ Admin MQTT Connected');
            led.className = 'led led-online';
            textSpan.innerHTML = '✅ Connected · Monitoring all sites';
            SUBSCRIBE_TOPICS.forEach(topic => client.subscribe(topic));
        });
        
        client.on('error', (err) => {
            console.error('MQTT Error:', err);
            led.className = 'led led-offline';
            textSpan.innerHTML = '❌ Connection error';
        });
        
        client.on('message', (topic, payload) => {
            try {
                const data = JSON.parse(payload.toString());
                console.log('📨 Received:', data);
                lastAnyMessage = Date.now();
                document.getElementById('telemetryTimer').innerHTML = `📡 Last: ${new Date().toLocaleTimeString()}`;
                if (data.type === 'telemetry') {
                    processTelemetry(data);
                } else {
                    processMessage(data);
                }
            } catch(e) { console.error('Parse error:', e); }
        });
    }

    // ============================================
    // FIXED: Offline detection using actual timestamps
    // ============================================
    function startOfflineDetection() {
        setInterval(() => {
            const now = Date.now();
            for (let siteKey in sites) {
                if (sites[siteKey].lastUpdateTimestamp) {
                    const timeSinceLast = now - sites[siteKey].lastUpdateTimestamp;
                    if (timeSinceLast > OFFLINE_TIMEOUT_MS && !sites[siteKey].offline) {
                        sites[siteKey].offline = true;
                        sites[siteKey].alert = 'OFFLINE';
                        updateSiteUI(siteKey, sites[siteKey]);
                        addLog('OFFLINE', sites[siteKey].location, sites[siteKey].siteId, 'No communication received', 'Check device connection', 'timeout');
                        updateStats();
                    }
                }
            }
        }, 10000);
    }

    // Live indicator
    setInterval(() => {
        const timeSince = (Date.now() - lastAnyMessage) / 1000;
        const liveIndicator = document.getElementById('liveIndicator');
        if (timeSince < 15) {
            liveIndicator.innerHTML = '● ONLINE';
            liveIndicator.style.color = '#4caf50';
        } else if (timeSince < 30) {
            liveIndicator.innerHTML = '● DEGRADED';
            liveIndicator.style.color = '#ff9800';
        } else {
            liveIndicator.innerHTML = '● OFFLINE';
            liveIndicator.style.color = '#f44336';
        }
    }, 3000);

    loadLogs();
    updateTime();
    setInterval(updateTime, 1000);
    startOfflineDetection();
    connectMQTT();
    
    setTimeout(() => { if (!audioEnabled) showAudioReminder(); }, 1000);
</script>
</body>
